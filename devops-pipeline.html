<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps Pipeline — Interactive Reference</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #1a1d25;
    --border: #2a2d38;
    --border2: #3a3d4a;
    --text: #e8eaf0;
    --muted: #7a7d8a;
    --accent-purple: #7c6fff;
    --accent-teal: #2dd4a0;
    --accent-amber: #f5a623;
    --accent-red: #ff5f5f;
    --accent-green: #4cde8a;
    --accent-blue: #4fa3e8;
    --accent-coral: #ff7559;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  header h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  header span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.05em;
  }

  /* ── Hint bar ── */
  .hint {
    padding: 10px 32px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .hint b { color: var(--accent-teal); }

  /* ── Pipeline canvas ── */
  .canvas {
    padding: 40px 24px;
    overflow-x: auto;
  }

  .pipeline-svg {
    display: block;
    width: 100%;
    max-width: 760px;
    margin: 0 auto;
  }

  /* ── SVG node styles ── */
  .pipeline-svg .node-group {
    cursor: pointer;
  }
  .pipeline-svg .node-group rect,
  .pipeline-svg .node-group circle {
    transition: filter 0.15s ease, stroke 0.15s ease;
  }
  .pipeline-svg .node-group:hover rect,
  .pipeline-svg .node-group:hover circle {
    filter: brightness(1.3);
    stroke-width: 1.5;
  }
  .pipeline-svg .node-group:active rect,
  .pipeline-svg .node-group:active circle {
    filter: brightness(1.6);
  }

  /* ── Bottom sheet overlay ── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 100;
    backdrop-filter: blur(3px);
  }
  .overlay.open { display: block; }

  /* ── Bottom sheet ── */
  .sheet {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border2);
    border-radius: 20px 20px 0 0;
    z-index: 101;
    max-height: 85vh;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    padding-bottom: env(safe-area-inset-bottom, 24px);
  }
  .sheet.open {
    transform: translateY(0);
  }

  .sheet-handle {
    width: 40px; height: 4px;
    background: var(--border2);
    border-radius: 2px;
    margin: 14px auto 0;
  }

  .sheet-header {
    padding: 20px 28px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .sheet-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .sheet-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .sheet-subtitle {
    font-size: 12px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 2px;
  }
  .sheet-close {
    margin-left: auto;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 32px; height: 32px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
  }
  .sheet-close:hover { background: var(--border); color: var(--text); }

  .sheet-body {
    padding: 24px 28px;
  }

  /* ── Content blocks inside sheet ── */
  .block {
    margin-bottom: 24px;
  }
  .block-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .block p {
    font-size: 15px;
    line-height: 1.7;
    color: #c8cad4;
  }
  .block p + p { margin-top: 10px; }

  .highlight-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent-teal);
    border-radius: 0 8px 8px 0;
    padding: 14px 16px;
    margin: 16px 0;
    font-size: 14px;
    line-height: 1.6;
    color: #c8cad4;
  }
  .highlight-box.warn { border-left-color: var(--accent-amber); }
  .highlight-box.danger { border-left-color: var(--accent-red); }
  .highlight-box.info { border-left-color: var(--accent-blue); }
  .highlight-box.purple { border-left-color: var(--accent-purple); }

  .tag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }
  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid;
  }
  .tag.purple { color: var(--accent-purple); border-color: #7c6fff44; background: #7c6fff11; }
  .tag.teal   { color: var(--accent-teal);   border-color: #2dd4a044; background: #2dd4a011; }
  .tag.amber  { color: var(--accent-amber);  border-color: #f5a62344; background: #f5a62311; }
  .tag.red    { color: var(--accent-red);    border-color: #ff5f5f44; background: #ff5f5f11; }
  .tag.green  { color: var(--accent-green);  border-color: #4cde8a44; background: #4cde8a11; }
  .tag.blue   { color: var(--accent-blue);   border-color: #4fa3e844; background: #4fa3e811; }
  .tag.coral  { color: var(--accent-coral);  border-color: #ff755944; background: #ff755911; }

  /* ── Flow diagram inside sheet ── */
  .mini-flow {
    display: flex;
    align-items: center;
    gap: 0;
    flex-wrap: wrap;
    margin: 14px 0;
    row-gap: 8px;
  }
  .flow-step {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
  }
  .flow-arrow {
    color: var(--muted);
    padding: 0 6px;
    font-size: 14px;
    flex-shrink: 0;
  }

  /* Phase label strip */
  .phase-strip {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .phase-chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 4px 10px;
    border-radius: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
  }

  /* Comparison table */
  .compare {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin: 14px 0;
  }
  .compare th {
    text-align: left;
    padding: 8px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }
  .compare td {
    padding: 10px 12px;
    border: 1px solid var(--border);
    color: #c8cad4;
    vertical-align: top;
    line-height: 1.5;
  }
  .compare tr:nth-child(even) td { background: var(--surface2); }
</style>
</head>

    body: `
      <div class="block">
        <div class="block-label">What an artifact store is</div>
        <p>After tests pass, Maven packages the code into an immutable versioned artifact — a <code style="font-family:JetBrains Mono;background:#1a1d25;padding:2px 6px;border-radius:4px;font-size:13px">.jar</code>, <code style="font-family:JetBrains Mono;background:#1a1d25;padding:2px 6px;border-radius:4px;font-size:13px">.war</code>, or Docker image. That artifact is stored in Nexus/JFrog/registry and never rebuilt again. Every environment (staging, production) pulls this exact same binary.</p>

    body: `
      <div class="block">
        <div class="block-label">IaC vs GitOps — the key distinction</div>
        <p>IaC is the <em>what</em> — Terraform, Ansible, Kubernetes YAML files describing desired state. GitOps is the <em>how you operate it</em> — Git is the only mechanism by which that IaC ever gets applied. Nobody runs <code style="font-family:JetBrains Mono;background:#1a1d25;padding:2px 6px;border-radius:4px;font-size:13px">kubectl apply</code> or <code style="font-family:JetBrains Mono;background:#1a1d25;padding:2px 6px;border-radius:4px;font-size:13px">terraform apply</code> manually.</p>
      </div>
      <div class="highlight-box danger">
        Most teams that claim to "do GitOps" are actually just storing Terraform in Git and running it manually from a pipeline. That's IaC with version control — not GitOps. The difference is the reconciliation loop.
      </div>
      <div class="block">
        <div class="block-label">The 4 GitOps principles</div>
        <div class="tag-row">
          <span class="tag purple">1. Declarative</span>
          <span class="tag purple">2. Versioned</span>
          <span class="tag teal">3. Pulled</span>
          <span class="tag teal">4. Continuously reconciled</span>
        </div>
        <p style="margin-top:12px;font-size:14px;line-height:1.6;color:#c8cad4"><strong style="color:#a09aff">Pulled</strong> = ArgoCD agent <em>inside</em> the cluster polls Git. Your CI server never needs cluster credentials. This is the security win — a compromised Jenkins can't touch prod directly.</p>
      </div>
      <div class="block">
        <div class="block-label">Drift detection — GitOps killer feature</div>
        <p>Someone accidentally deletes a Kubernetes pod manually? ArgoCD detects the live state has drifted from Git's declared state and automatically recreates it. Git always wins. Your cluster self-heals to match the repo.</p>
      </div>
      <div class="block">
        <div class="block-label">Tools</div>
        <table class="compare">
          <tr><th>ArgoCD</th><th>Flux CD</th></tr>
          <tr><td>GUI dashboard</td><td>CLI-first, lightweight</td></tr>
          <tr><td>Multi-cluster support</td><td>Simpler to get started</td></tr>
          <tr><td>CNCF graduated</td><td>CNCF graduated</td></tr>
        </table>
      </div>
    `
  }
};

function openSheet(id) {
  const item = data[id];
  if (!item) return;

  const icon = document.getElementById('sheet-icon');
  icon.textContent = item.icon;
  icon.style.background = item.iconBg;
  icon.style.border = `1px solid ${item.iconBorder}`;

  document.getElementById('sheet-title').textContent = item.title;
  document.getElementById('sheet-title').style.color = item.color;
  document.getElementById('sheet-subtitle').textContent = item.subtitle;
  document.getElementById('sheet-body').innerHTML = item.body;

  document.getElementById('overlay').classList.add('open');
  document.getElementById('sheet').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeSheet() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
  document.body.style.overflow = '';
}

// Swipe to close
let startY = 0;
const sheet = document.getElementById('sheet');
sheet.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive: true });
sheet.addEventListener('touchend', e => {
  if (e.changedTouches[0].clientY - startY > 80) closeSheet();
}, { passive: true });
</script>
</body>
